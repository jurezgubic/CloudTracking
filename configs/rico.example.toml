# CloudTracker configuration for RICO (UCLA-LES format)
# Copy to rico.toml and set base_file_path to your local data directory.

# 'UCLA-LES': One file per variable, all timesteps per file (e.g. RICO, DALES)
# 'MONC': One file per timestep, all variables per file (e.g. LBA, RCE)
[data]
data_format = "UCLA-LES"
base_file_path = "/path/to/RICO_data/"

# Variable name -> filename mapping
[data.file_name]
l = "rico.l.nc"  # Liquid water mixing ratio
u = "rico.u.nc"  # u wind
v = "rico.v.nc"  # v wind
w = "rico.w.nc"  # Vertical velocity
p = "rico.p.nc"  # Pressure
t = "rico.t.nc"  # Liquid water potential temperature
q = "rico.q.nc"  # Total water mixing ratio
r = "rico.r.nc"  # Rain water mixing ratio (optional)

[cloud_identification]
min_size = 10          # Minimum number of points for a cloud
l_condition = 5e-4     # kg/kg. Minimum liquid water content
w_condition = 0.0      # m/s. Minimum vertical velocity
w_switch = false       # If true, apply w_condition threshold
b_condition = 0.0      # m/s^2. Minimum buoyancy (0 = positively buoyant)
b_switch = false       # If true, apply b_condition threshold

[simulation]
timestep_duration = 60       # Seconds between timesteps (LBA: 180, RICO: 60)
horizontal_resolution = 25.0 # m. Grid resolution (LBA: 200, RICO: 25). Auto-updated from adapter.

[physics]
switch_wind_drift = true      # Consider mean horizontal motion in tracking
switch_vertical_drift = true  # Consider mean vertical motion in tracking
cloud_base_altitude = 700     # m. Estimated cloud base altitude

[matching]
distance_threshold = 0               # Max distance between merging clouds across periodic boundary
min_h_match_factor = 2.5             # Min horizontal match factor (min_dist = factor * horizontal_resolution)
min_v_match_factor = 2.5             # Min vertical match factor
match_safety_factor_dynamic = 2.0    # Dynamic safety factor for velocity-based matching
bounding_box_safety_factor = 1.2     # Safety factor for centroid-based pre-filtering
max_expected_cloud_speed = 15.0      # m/s. Constrains the matching search space
use_pre_filtering = true             # Use centroid pre-filtering to speed up matching
switch_prefilter_fallback = false    # If true, fall back to full-domain search when pre-filter finds nothing
min_surface_overlap_points = 1       # Minimum overlapping surface points for a match
match_shell_layers = 3               # Cloud shell layers for matching (1 = surface only)

[merge_split]
# 'age': oldest parent wins merge. 'size': largest parent wins.
# Also controls parent selection for orphaned merge children.
merge_winner_criterion = "age"

[visualisation]
plot_switch = false  # If true, plot the cloud field at each timestep (deprecated)

[cloud_base]
base_scan_levels = 3          # Levels to scan upward for diagnosed base from lowest cloud level
base_increase_threshold = 1.5 # Factor required to increase base radius (1.5 = 50% increase)

# Neighbour Interaction Potential parameters
[nip]
nip_gamma = 0.3      # Kinematic boost coefficient
nip_f = 3.0          # Radius multiplier for neighbour search per level
nip_Lh_min = 100.0   # Min horizontal scale [m]
nip_Lh_max = 2000.0  # Max horizontal scale [m]
nip_T_min = 60.0     # Min temporal memory scale [s]
nip_T_max = 6000.0   # Max temporal memory scale [s]

[environment]
env_ring_max_distance = 4          # Max Manhattan ring distance around cloud edge (2D)
env_periodic_rings = true          # Respect periodic boundaries when forming rings
env_aloft_levels = 20              # Levels above cloud top to analyze (-1 for all)
env_aloft_mode = "flat"            # 'flat' (plane above max top) or 'local' (following cloud terrain)
env_aloft_sampling_mode = "fixed_mean_area"  # 'exact' (cloud shape) or 'fixed_mean_area' (circle)

[performance]
cloud_batch_size = 50  # Clouds to process before forcing garbage collection

[output]
output_path = "cloud_results.nc"
total_timesteps = -1  # Number of timesteps to process (-1 for all available)
